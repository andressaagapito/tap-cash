services:
  - type: web
    name: tapcash-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: sh start.sh
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_SSL_MODE
        value: require
      - key: CORS_ORIGINS
        sync: false
